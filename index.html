<script>
  function showPage(page, btn){

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

  if(page === "roll"){
    document.getElementById("rollPage").classList.add("active");
  }

  else if(page === "inventory"){
    document.getElementById("inventoryPage").classList.add("active");
  }

  else if(page === "leaderboard"){
    document.getElementById("leaderboardPage").classList.add("active");
    window.loadLeaderboard(); // refresh when opened
  }

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");

  moveBlob(btn);
  save();
}

function moveBlob(btn){
  const blob = document.getElementById("blob");

  const parent = btn.parentElement;
  const parentRect = parent.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();

  const left = btnRect.left - parentRect.left;

  blob.style.width = btn.offsetWidth + "px";
  blob.style.left = left + "px";
}

function spawnCardSparklesOn(el, rarityType){

  el.querySelectorAll(".cardSparkle").forEach(e => e.remove());
  
  const colors = {
    rare: "#4da6ff",
    epic: "#b84dff",
    legendary: "#ffd700",
    mythic: "#ff3030"
  };

  const color = colors[rarityType];
  if(!color) return;

  const rect = el.getBoundingClientRect();

  const corners = [
    { x: 0, y: rect.height },      // bottom-left
    { x: rect.width, y: 0 }        // top-right
  ];

  for (const corner of corners) {

    const isBottomLeft = (corner.x === 0 && corner.y === rect.height);
    const isTopRight   = (corner.x === rect.width && corner.y === 0);

    for (let i = 0; i < 2; i++) {

      const s = document.createElement("div");
      s.className = "cardSparkle";
      s.style.color = color;

      const isBig = (i === 0);

      const size = isBig ? 56 : 32;
      s.style.width = size + "px";
      s.style.height = size + "px";

      let x = corner.x;
      let y = corner.y;

      let jitterX = 0;
      let jitterY = 0;

      // DEFAULT
      if (!isBottomLeft && !isTopRight) {
        jitterX = isBig ? -2 : 3;
        jitterY = isBig ? 3 : -2;
      }

      // 🔥 bottom-left (your original rule)
      else if (isBottomLeft) {
        if (isBig) {
          jitterX = 0;
          jitterY = 0;
        } else {
          jitterX = 10;
          jitterY = -10;
        }
      }

      // 🔥 TOP-RIGHT (SWAPPED big/small behavior)
      else if (isTopRight) {
        if (isBig) {
          // BIG now goes INWARD
          jitterX = -10;
          jitterY = 10;
        } else {
          // SMALL sits on edge
          jitterX = 0;
          jitterY = 0;
        }
      }

      s.style.left = (x + jitterX) + "px";
      s.style.top = (y + jitterY) + "px";

      const offset = isTopRight
        ? (isBig ? sparkleGap / 2 : -sparkleGap / 2)
        : (isBig ? -sparkleGap / 2 : sparkleGap / 2);
      
      const dx = (corner.x === 0 ? -1 : 1) * offset;
      const dy = (corner.y === 0 ? -1 : 1) * offset;

      s.style.setProperty("--dx", dx + "px");
      s.style.setProperty("--dy", dy + "px");

      s.style.zIndex = isBig ? 2 : 1;

      el.appendChild(s);
    }
  }
}

function rarity(o){
  if(o<=16) return "common";
  if(o<=64) return "rare";
  if(o<=500) return "epic";
  if(o<=1024) return "legendary";
  return "mythic";
}

/* RNG */
function pick(){
  // weighted selection so commons appear more often during flicker
  const weights = viewers.map(v => 1 / v.odds);

  let total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;

  for(let i = 0; i < viewers.length; i++){
    r -= weights[i];
    if(r <= 0) return viewers[i];
  }

  return viewers[0];
}

function applyCardMigrations(inv){

  const migrated = {};
  const alreadyMigrated = {};

  for(const [id,count] of Object.entries(inv)){

    if(cardMigrations[id]){
      const newId = cardMigrations[id];

      migrated[newId] =
        (migrated[newId] || 0) + count;

      alreadyMigrated[id] = true;

    } else {

      migrated[id] =
        (migrated[id] || 0) + count;

    }
  }

  return migrated;
}
  
/* ROLL */
let running=false;
let autoRoll = false;
let autoRollTimer = null;

function toggleAutoRoll(){

  autoRoll = !autoRoll;

  const state = document.getElementById("autoRollState");

  if(autoRoll){

    state.textContent = "ON";
    state.className = "autoOn";

    autoRollStartTime = Date.now();

    if(!running){
      roll();
    }

  }else{

    state.textContent = "OFF";
    state.className = "autoOff";

    autoRollStartTime = null;
  }
}

function weightedPick(){
  let total = 0;

  for (let v of viewers) {
    total += 1 / v.odds;
  }

  let r = Math.random() * total;

  let acc = 0;
  for (let v of viewers) {
    acc += 1 / v.odds;
    if (r <= acc) return v;
  }
}

function roll(){
    if (document.hidden) {
  
    let final = weightedPick();
  
    rolls++;
    document.getElementById("rolls").innerText = rolls;
  
    show(final);
    finish(final);
  
    if(autoRoll){
      setTimeout(roll, 3000);
    }
  
    return;
  }
  
  if(running) return;
  running = true;

  rolls++;
  document.getElementById("rolls").innerText = rolls;

  const start = performance.now();
  const rollDuration = 3000;

  function visualPick(){
    return viewers[Math.floor(Math.random() * viewers.length)];
  }

  function frame(t){
    let p = (t - start) / rollDuration;
    if(p > 1) p = 1;

    let delay = 35 + (220 * p);

    if(p < 1){
      let v = visualPick();
      show(v);

      setTimeout(() => {
        requestAnimationFrame(frame);
      }, delay);

    } else {
      let final = weightedPick();
      show(final);
      finish(final);
      setTimeout(() => {
        running = false;

        if(autoRoll){
          roll();
        }
      }, 50);
    }
  }

  requestAnimationFrame(frame);
}

/* SHOW */
function show(v){
  const display = document.getElementById("display");

  document.getElementById("img").src = v.image;
  document.getElementById("name").innerText = v.id;
  document.getElementById("odds").innerText = "1 in " + v.odds;

  display.className = "";
  const r = rarity(v.odds);
  display.classList.add(r);

  // 🔥 IMPORTANT: remove old sparkles whenever card changes
  display.querySelectorAll(".cardSparkle").forEach(e => e.remove());
}

function migrateOldSave() {
  const old = JSON.parse(localStorage.getItem("inv") || "{}");
  const newInv = {};

  for (const v of viewers) {
    // if old save used names, convert them
    if (old[v.name] !== undefined) {
      newInv[v.id] = old[v.name];
    }

    // already-migrated or new
    if (old[v.id] !== undefined) {
      newInv[v.id] = old[v.id];
    }
  }

  inventory = newInv;
  save();
}

const cardUpgrades = {
  theos: {
    oldOdds: 10000,
    newOdds: 100000
  }
};

function getLocalDataSafe(){
  return {
    rolls: Number(localStorage.getItem("rolls") || 0),
    inv: JSON.parse(localStorage.getItem("inv") || "{}")
  };
}

function migrateCardUpgrades() {
  // Only run ONCE during migration phase
  for (const v of viewers) {
    const upgrade = cardUpgrades[v.id];
    if (!upgrade) continue;

    if (v.odds === upgrade.oldOdds) {
      v.odds = upgrade.newOdds;
    }
  }
}

/* FINISH */
function finish(v){

  inventory[v.id] = (inventory[v.id] || 0) + 1;

  const r = rarity(v.odds);

  if(r !== "common"){
    const display = document.getElementById("display");
    spawnCardSparklesOn(display, r);
  }

  if(r === "legendary" || r === "mythic"){
    playCutscene(r);
  }

  if (!best || v.odds > best.odds) {
    best = { name: v.id, odds: v.odds };
  
    const bestText = document.getElementById("best");
    bestText.innerText = `${best.name} (1/${best.odds})`;

    bestText.className = "";
    bestText.classList.add("best-" + rarity(best.odds));
  }

save();
render();
  
}

function updateBestUI() {
  const bestText = document.getElementById("best");

  if (!best) {
    bestText.innerText = "None";
    bestText.className = "";
    return;
  }

  bestText.innerText = `${best.name} (1/${best.odds})`;
  bestText.className = "";
  bestText.classList.add("best-" + rarity(best.odds));
}

function recalcBest() {
  let newBest = null;

  for (const v of viewers) {
    const count = inventory[v.id] || 0;
    if (count > 0) {
      if (!newBest || v.odds > newBest.odds) {
        newBest = {
          name: v.id,
          odds: v.odds
        };
      }
    }
  }

  best = newBest;
  updateBestUI();
}

const LOCAL_SYNC_FLAG = "local_synced_v1";

async function mergeLocalToCloud() {
  if (localStorage.getItem(LOCAL_SYNC_FLAG) === "1") return;
  if (!currentUser) return;

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  if (!data) return;

  const local = getLocalDataSafe();
  const localRolls = local.rolls;
  const localInv = local.inv;

  const cloudInv = data.inventory || {};

  // merge inventories (ADD counts)
  const mergedInv = { ...cloudInv };

  for (const [id, count] of Object.entries(localInv)) {
    mergedInv[id] = (mergedInv[id] || 0) + count;
  }

  const mergedRolls = (data.rolls || 0) + localRolls;

  await supabase
    .from("profiles")
    .update({
      rolls: mergedRolls,
      inventory: mergedInv
    })
    .eq("id", currentUser.id);

  // clear local AFTER merge
  localStorage.setItem("rolls", "0");
  localStorage.setItem("inv", JSON.stringify({}));

  localStorage.setItem(LOCAL_SYNC_FLAG, "1");
}

async function submitAuth(){

  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const usernameInput = document.getElementById("username");

  const email = emailInput.value;
  const password = passwordInput.value;
  const username = usernameInput.value;
  const confirmPassword =
  document.getElementById("confirmPassword").value;

  if(document.getElementById("authTitle").innerText === "Login"){

    const { data, error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if(error) return alert(error.message);

    currentUser = data.user;
    
    // 1. load cloud first
    await loadCloudData();
    
    // 2. merge local → cloud
    await mergeLocalToCloud();
    
    // 3. reload FINAL cloud state
    await loadCloudData();
    
    renderAuthUI();
    closeAuth();

  } else {
  
    if(password !== confirmPassword){
      return alert("Passwords do not match.");
    }
  
    const { data, error } = await supabase.auth.signUp({
      email,
      password
    });

    if(error) return alert(error.message);

    currentUser = data.user;
    
    await supabase.from("profiles").upsert({
      id: currentUser.id,
      username: username,
      email: email,
      rolls: rolls || 0,
      best_name: best?.name || null,
      best_odds: best?.odds || null,
      inventory: inventory ?? {}
    });
    
    await loadCloudData();
    renderAuthUI();   // 👈 ADD THIS
    closeAuth();
  }
}

async function loadCloudData(){
  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  if(!data) return;

  if (!currentUser) return;
  
  // only trust cloud if local is empty OR first login sync
  const localRolls = Number(localStorage.getItem("rolls") || 0);
  const localInv = JSON.parse(localStorage.getItem("inv") || "{}");
  
  rolls = Math.max(data.rolls ?? 0, localRolls);
  inventory = applyCardMigrations(data.inventory ?? {});
  currentUser.user_metadata = {
    username: data.username
  };

  if(data.best_name){
    best = {
      name: data.best_name,
      odds: data.best_odds
    };
    updateBestUI();
    cloudReady = true;
    window.cloudReady = true;
    
    // force leaderboard refresh immediately
    window.loadLeaderboard?.();
  }

  document.getElementById("rolls").innerText = rolls;
  cloudReady = true;
  window.cloudReady = true;
}

  localStorage.setItem("best", JSON.stringify(best));

function easeInExpo(t){
  return t === 0 ? 0 : Math.pow(2, 10 * (t - 1));
}

window.playCutscene = function(type){
  const overlay = document.getElementById("cutsceneOverlay");
  const red = document.getElementById("redLight");

  if(type === "legendary"){
    red.style.setProperty(
      "--cutscene-color-bright",
      "rgba(255,215,0,0.95)"
    );

    red.style.setProperty(
      "--cutscene-color-mid",
      "rgba(255,215,0,0.5)"
    );
  }
  else{
    // mythic
    red.style.setProperty(
      "--cutscene-color-bright",
      "rgba(255,0,0,0.95)"
    );

    red.style.setProperty(
      "--cutscene-color-mid",
      "rgba(255,0,0,0.5)"
    );
  }

  const display = document.getElementById("display");

  const start = performance.now();

  const FADE_TO_BLACK = 300;
  const BLACK_HOLD = 700;

  const RED_START = FADE_TO_BLACK + BLACK_HOLD;
  const RED_DURATION = 3500;

  overlay.style.transition = "none";
  red.style.transition = "none";

  overlay.style.opacity = 0;
  red.style.opacity = 0;
  red.style.transform = "scale(0.2)";

  display.style.opacity = 0;

  function frame(now){
    const t = now - start;

    /* 1. fade to black */
    if(t < FADE_TO_BLACK){
      overlay.style.opacity = t / FADE_TO_BLACK;
    }

    /* 2. hold black */
    else if(t < RED_START){
      overlay.style.opacity = 1;
    }

    /* 3. red fade in (SMOOTH, not instant) */
    else if(t < RED_START + 400){
      overlay.style.opacity = 1;

      const p = (t - RED_START) / 400;

      red.style.opacity = p;
      red.style.transform = `scale(${0.2 + p * 0.4})`;
    }

    /* 4. exponential expansion (NO SHAPE SWITCH) */
    else if(t < RED_START + RED_DURATION){
      const p = (t - (RED_START + 400)) / (RED_DURATION - 400);

      const e = easeInExpo(p);

      red.style.opacity = 1;

      // keep uniform scaling base, then breathing stretch
      const base = 0.6 + e * 8;

      // subtle distortion only
      const stretch = 1 + (Math.sin(e * Math.PI) * 0.15);

      red.style.transform = `scale(${base * stretch})`;
    }

    /* 5. full screen burst */
    else if(t < RED_START + RED_DURATION + 200){
      red.style.opacity = 1;
      red.style.transform = "scale(25, 15)";
    }

    /* 6. fade out + reveal instantly */
    else{
      red.style.opacity = 0;
      overlay.style.opacity = 0;

      display.style.opacity = 1;
      return;
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
};

  autoRollStartTime = now;

  save();
  render();

  if(!running){
    roll();
  }
});  

</script>
</div>

<div id="redLight"></div>
</div>

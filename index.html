<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?famF<ily=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">F
<title>theos RNG</title>

<style>
body{
  margin:0;
  font-family: 'Orbitron', Arial, sans-serif;
  background:#0b0b0b;
  color:white;
}

#cutsceneOverlay{
  position: fixed;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 9998;
}

#redLight{
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;

  opacity: 0;
  transform: scale(0.2);

  background: radial-gradient(
    circle at center,
    var(--cutscene-color-bright) 0%,
    var(--cutscene-color-mid) 20%,
    rgba(0,0,0,0) 55%
  );

  filter: blur(2px);
  will-change: transform, opacity;
}

#cutscene{
  position: fixed;
  inset: 0;
  background: black;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
}

#leaderboardTable{
  max-width:1000px;
  margin:20px auto;
}

.lbRow{
  display:grid;
  grid-template-columns:
    80px
    1.5fr
    1fr
    1.5fr;

  padding:12px;

  border-bottom:1px solid #333;
}

.lbHeader{
  color:#42ff29;
  font-weight:bold;
}

@keyframes sparklePulse {
  0% {
    transform: translate(-50%, -50%) scale(0.9) rotate(0deg);
    opacity: 0.7;
  }

  50% {
    transform: translate(-50%, -50%) scale(1.25) rotate(15deg);
    opacity: 1;
  }

  100% {
    transform: translate(-50%, -50%) scale(0.9) rotate(0deg);
    opacity: 0.7;
  }
}

@keyframes flashPurple {
  0% { opacity: 0; background: black; }
  20% { opacity: 1; background: #7a00ff; }
  40% { opacity: 0; }
  60% { opacity: 1; background: #7a00ff; }
  100% { opacity: 0; }
}

@keyframes flashRed {
  0% { opacity: 0; background: black; }
  25% { opacity: 1; background: red; }
  50% { opacity: 0; }
  75% { opacity: 1; background: darkred; }
  100% { opacity: 0; }
}

@keyframes sparkleFloat{
  0%{
    opacity:0;
    transform:scale(0);
  }

  15%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:
      translate(var(--dx), var(--dy))
      scale(1.4)
      rotate(180deg);
  }
}

html, body {
  height: 100%;
  overflow: hidden;
}

/* HEADER + HUD */
.header{
  text-align:center;
  padding:15px;
  background:#111;
  border-bottom:2px solid #222;
}

.nav{
  display: flex;
  justify-content: center;
  margin: 18px auto 22px auto;

  width: 100%;
}

.nav-inner{
  position: relative;
  display: flex;

  border: 2px solid #42ff29;
  border-radius: 999px;
  background: rgba(0,0,0,0.35);

  height: 56px;

  width: max-content;
  min-width: 260px;

  box-sizing: border-box;
  overflow: hidden;
}

.nav-frame{
  display:flex;
  justify-content:center;
  margin-top:10px;
}

.tab{
  font-family: 'Orbitron', Arial, sans-serif;
  height: 100%;
  padding: 0 40px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: transparent;
  border: none;
  color: white;
  z-index: 2;
}

.blob{
  position: absolute;
  top: 0;
  bottom: 0;

  left: 0;

  height: 100%;
  border-radius: 999px;

  background: #42ff29;
  opacity: 0.25;

  z-index: 1;

  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

.page{
  display:none;
}

.page.active{
  display:block;
}

.header h1{
  color:#42ff29;
  text-shadow:0 0 10px #42ff29;
  margin:0;
  justify-self:center;
}

.best-common{
  color:gray;
}

.best-rare{
  color:#4da6ff;
}

.best-epic{
  color:#b84dff;
}

.best-legendary{
  color:gold;
}

.best-mythic{
  color:#ff4d4d;
}  

.hud{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:10px 20px;
}

.hudBox{
  padding:12px 18px;
  border-radius:12px;
  background:#1a1a1a;
  border:2px solid #42ff29;
  font-size:16px;
  font-weight:bold;
  box-shadow:0 0 10px rgba(66,255,41,0.3);
  user-select:none;
  pointer-events:none;
}


.authModal{
  position:fixed;
  inset:0;

  background:rgba(0,0,0,.7);

  display:none;
  justify-content:center;
  align-items:center;

  z-index:10000;
}

.authCard{
  width:400px;

  background:#111;

  border:2px solid #42ff29;

  border-radius:16px;

  padding:30px;

  display:flex;
  flex-direction:column;
  gap:12px;
}

.authCard input{
  padding:12px;

  border-radius:8px;

  border:none;

  background:#1d1d1d;
  color:white;
}

#rollBox{
  color:#42ff29;
  justify-self:start;
}

#bestBox{
  justify-self:end;
}
/* CENTER AREA */
.roll-area{
  text-align:center;
  padding:20px 30px 0 30px;
  transform: translateY(-10px);
}

#authButtons{
  display:flex;
  gap:10px;
  justify-self:end;
}

.authLoginBtn{
  background:#42ff29;
  color:black;

  border:none;
  border-radius:10px;

  padding:10px 18px;

  font-family:Orbitron;
  cursor:pointer;
}

.authSignupBtn{
  background:#444;
  color:white;

  border:none;
  border-radius:10px;

  padding:10px 18px;

  font-family:Orbitron;
  cursor:pointer;
}

#rollSection{
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* ROLL DISPLAY */
#display{
  width:360px;
  margin:15px auto 18px auto;
  padding:20px;
  border-radius:15px;
  overflow:visible;
  background:#181818;
  transition: opacity 0.2s ease;
  position: relative;
}

#display img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
}

#name{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

#odds{ color:#aaa; }

.rollBtn{
  padding:18px 70px;
  font-size:20px;
  border:none;
  border-radius:12px;
  cursor:pointer;

  background:#42ff29;
  color:#0b0b0b;

  font-family: 'Orbitron', Arial, sans-serif;

  margin-top:15px;

  box-shadow:0 0 12px rgba(66,255,41,0.4);
  transition:0.2s ease;
}

.rollBtn:hover{
  transform: scale(1.05);
  box-shadow:0 0 18px rgba(66,255,41,0.7);
}

.autoRollBtn{
  padding:18px 70px;
  font-size:20px;
  border:none;
  border-radius:12px;
  cursor:pointer;

  background:#555;
  color:white;

  font-family:'Orbitron', Arial, sans-serif;

  margin-top:12px;

  box-shadow:0 0 12px rgba(255,255,255,0.15);
  transition:0.2s ease;
}

.autoRollBtn:hover{
  transform:scale(1.05);
  box-shadow:0 0 18px rgba(255,255,255,0.25);
}

.autoOn{
  color:#42ff29;
}

.autoOff{
  color:#ff4040;
}

/* INVENTORY */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:20px;
}

.card{
  border-radius:12px;
  text-align:center;
  padding:10px;
  position:relative;
  overflow:hidden;
  transition:0.3s;
  background:#1a1a1a;

  /* 🔥 ADD THIS */
  min-height:170px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
}

.card img{
  width:70px;
  height:70px;
  border-radius:50%;
  margin:0 auto;
}

.cardSparkle{
  position:absolute;
  pointer-events:none;
  filter: drop-shadow(0 0 6px currentColor);

  transform: translate(-50%, -50%) scale(1);
  animation: sparklePulse 1.6s ease-in-out infinite;
}

.cardSparkle::before{
  content:"";
  position:absolute;
  inset:0;
  background:currentColor;

  /* 4-point star shape */
  clip-path: polygon(
    50% 0%,
    62% 38%,
    100% 50%,
    62% 62%,
    50% 100%,
    38% 62%,
    0% 50%,
    38% 38%
  );

  box-shadow:
    0 0 8px currentColor,
    0 0 16px currentColor;
}

/* rarity glow + color themes */
.card.common{ box-shadow:0 0 8px gray; background:linear-gradient(145deg,#1a1a1a,#2a2a2a); }
.card.rare{ box-shadow:0 0 12px #4da6ff; background:linear-gradient(145deg,#0b1a2a,#123a66); }
.card.epic{ box-shadow:0 0 18px #b84dff; background:linear-gradient(145deg,#1a0b2a,#3a1266); }
.card.legendary{ box-shadow:0 0 25px gold; background:linear-gradient(145deg,#2a220b,#665012); }
.card.mythic{ box-shadow:0 0 35px red; background:linear-gradient(145deg,#2a0b0b,#661212); }

/* PREVIEW SCREEN RARITIES */
#display.common{ background:linear-gradient(145deg,#1a1a1a,#2a2a2a); box-shadow:0 0 15px gray; }
#display.rare{ background:linear-gradient(145deg,#0b1a2a,#123a66); box-shadow:0 0 20px #4da6ff; }
#display.epic{ background:linear-gradient(145deg,#1a0b2a,#3a1266); box-shadow:0 0 25px #b84dff; }
#display.legendary{ background:linear-gradient(145deg,#2a220b,#665012); box-shadow:0 0 30px gold; }
#display.mythic{ background:linear-gradient(145deg,#2a0b0b,#661212); box-shadow:0 0 40px red; }

/* locked */
.locked img{
  filter:blur(8px) grayscale(1);
  transform:scale(1.1);
}

.card{
  position:relative;
}

.card:hover{
  transform: scale(1.03);
}

/* LOCKED STATE (NEW SYSTEM) */
.card.locked{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  position:relative;
}

.card.locked img{
  filter:blur(8px) grayscale(1);
  transform:scale(1.1);
}

/* big ??? in center */
.lockedText{
  font-size:28px;
  font-weight:bold;
  letter-spacing:2px;
}

/* "Locked" text under it */
.lockedSub{
  font-size:14px;
  color:#aaa;
}

</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="hud">

      <div id="rollSection">

      <div class="hudBox" id="rollBox">
        Rolls: <span id="rolls">0</span>
      </div>
    
      <div class="hudBox" id="bestBox">
        Best:
        <span id="best">None</span>
      </div>
    
    </div>

    <h1>theos RNG</h1>

    <div id="authButtons">
    
      <button id="loginBtn" class="authLoginBtn">
        Login
      </button>
    
      <button id="signupBtn" class="authSignupBtn">
        Sign Up
      </button>
    
    </div>

  </div>

</div>

<!-- NAV (tabs) -->
<div class="nav">

  <div class="nav-inner">

    <div class="blob" id="blob"></div>

    <button class="tab active" onclick="showPage('roll',this)">
      Roll
    </button>
    
    <button class="tab" onclick="showPage('inventory',this)">
      Inventory
    </button>
    
    <button class="tab" onclick="showPage('leaderboard',this)">
      Leaderboard
    </button>

  </div>

</div>

<!-- GAME -->
<div id="rollPage" class="page active">

  <div class="roll-area">

    <div id="display">
      <img id="img" src="https://i.pravatar.cc/150">
      <div id="name">Press Roll</div>
      <div id="odds"></div>
    </div>

    <button class="rollBtn" onclick="roll()">ROLL</button>
    <button class="autoRollBtn" onclick="toggleAutoRoll()" id="autoRollBtn">
      AUTOROLL: <span id="autoRollState" class="autoOff">OFF</span>
    </button>
  </div>

</div>

<!-- INVENTORY -->
<div id="inventoryPage" class="page">
  <div id="inventory" class="grid"></div>
</div>
<div id="leaderboardPage" class="page">

  <div id="leaderboardTable"></div>

</div>
<script>
(() => {
  "use strict";

  /* =========================
     SAFE DOM REFERENCES
  ========================= */
  const $ = (id) => document.getElementById(id);

  const ui = {
    rolls: $("rolls"),
    best: $("best"),
    display: $("display"),
    img: $("img"),
    name: $("name"),
    odds: $("odds"),
    inventory: $("inventory"),
    blob: $("blob"),
    leaderboard: $("leaderboardTable"),

    loginBtn: $("loginBtn"),
    signupBtn: $("signupBtn"),

    authModal: $("authModal"),
    authTitle: $("authTitle"),
    authEmail: $("authEmail"),
    authPassword: $("authPassword"),
    authUsername: $("authUsername"),
    authSubmit: $("authSubmit"),
  };

  /* =========================
     SUPABASE (FIXED: NO DUPLICATE DECLARATION)
  ========================= */
  const SUPABASE_URL = "https://fbrhajuyjematnzgddec.supabase.co";
  const SUPABASE_ANON_KEY = "YOUR_KEY";

  // IMPORTANT FIX: global-safe singleton
  const supabase =
    window.__supabaseClient ??
    (window.__supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    ));

  /* =========================
     GAME DATA
  ========================= */

  const SAVE_KEY = "theos_rng_save";
  const SAVE_VERSION = 1;

  let currentUser = null;

  const viewers = [/* KEEP YOUR FULL ARRAY EXACTLY AS IS */];

  const cardMigrations = {
    theosGMD: "taiago7",
    midgatal: "twkn9",
    spaceuk: "kazagd"
  };

  const rarity = (o) => {
    if (o <= 16) return "common";
    if (o <= 64) return "rare";
    if (o <= 500) return "epic";
    if (o <= 1024) return "legendary";
    return "mythic";
  };

  /* =========================
     STATE
  ========================= */

  let saveData =
    JSON.parse(localStorage.getItem(SAVE_KEY)) || {};

  let inventory = saveData.inventory || {};
  let rolls = saveData.rolls || 0;
  let best = saveData.best || null;

  let running = false;
  let autoRoll = false;
  let autoRollStartTime = null;

  /* =========================
     SAVE SYSTEM
  ========================= */

  function save() {
    localStorage.setItem(
      SAVE_KEY,
      JSON.stringify({
        version: SAVE_VERSION,
        inventory,
        rolls,
        best
      })
    );
  }

  /* =========================
     ROLL SYSTEM
  ========================= */

  function weightedPick() {
    let total = viewers.reduce((a, v) => a + 1 / v.odds, 0);
    let r = Math.random() * total;

    for (const v of viewers) {
      r -= 1 / v.odds;
      if (r <= 0) return v;
    }
    return viewers[0];
  }

  function roll() {
    if (running) return;
    running = true;

    rolls++;
    ui.rolls.innerText = rolls;

    const start = performance.now();
    const duration = 3000;

    function frame(t) {
      let p = Math.min(1, (t - start) / duration);

      if (p < 1) {
        const v = viewers[Math.floor(Math.random() * viewers.length)];
        show(v);
        setTimeout(() => requestAnimationFrame(frame), 40 + p * 200);
      } else {
        const final = weightedPick();
        show(final);
        finish(final);
        running = false;

        if (autoRoll) setTimeout(roll, 200);
      }
    }

    requestAnimationFrame(frame);
  }

  /* =========================
     DISPLAY
  ========================= */

  function show(v) {
    ui.img.src = v.image;
    ui.name.innerText = v.id;
    ui.odds.innerText = `1 in ${v.odds}`;

    ui.display.className = rarity(v.odds);
    ui.display.querySelectorAll(".cardSparkle").forEach(e => e.remove());
  }

  /* =========================
     FINISH
  ========================= */

  function finish(v) {
    inventory[v.id] = (inventory[v.id] || 0) + 1;

    const r = rarity(v.odds);

    if (!best || v.odds > best.odds) {
      best = { name: v.id, odds: v.odds };
      ui.best.innerText = `${best.name} (1/${best.odds})`;
    }

    save();
    renderInventory();
  }

  /* =========================
     INVENTORY
  ========================= */

  function renderInventory() {
    ui.inventory.innerHTML = "";

    for (const v of viewers) {
      const owned = inventory[v.id];

      ui.inventory.innerHTML += `
        <div class="card ${owned ? rarity(v.odds) : "locked"}">
          ${
            owned
              ? `
            <img src="${v.image}">
            <div>${v.id}</div>
            <div>1 in ${v.odds}</div>
            <div>x${owned}</div>
          `
              : `
            <div class="lockedText">???</div>
            <div class="lockedSub">Locked</div>
          `
          }
        </div>
      `;
    }
  }

  /* =========================
     AUTO ROLL
  ========================= */

  function toggleAutoRoll() {
    autoRoll = !autoRoll;

    if (autoRoll && !running) roll();
  }

  /* =========================
     AUTH (FIXED SAFE DOM ACCESS)
  ========================= */

  let authMode = "login";

  function openLogin() {
    authMode = "login";
    ui.authTitle.textContent = "Login";
    ui.authUsername.style.display = "none";
    ui.authModal.style.display = "flex";
  }

  function openSignup() {
    authMode = "signup";
    ui.authTitle.textContent = "Create Account";
    ui.authUsername.style.display = "block";
    ui.authModal.style.display = "flex";
  }

  ui.loginBtn.onclick = openLogin;
  ui.signupBtn.onclick = openSignup;

  ui.authSubmit.onclick = async () => {
    const email = ui.authEmail.value;
    const password = ui.authPassword.value;

    if (authMode === "login") {
      const { data, error } =
        await supabase.auth.signInWithPassword({
          email,
          password
        });

      if (error) return alert(error.message);

      currentUser = data.user;
      alert("Logged in!");
    } else {
      const { data, error } =
        await supabase.auth.signUp({
          email,
          password
        });

      if (error) return alert(error.message);

      currentUser = data.user;
      alert("Account created!");
    }
  };

  /* =========================
     LEADERBOARD
  ========================= */

  async function loadLeaderboard() {
    const { data } = await supabase
      .from("leaderboard")
      .select("*")
      .limit(100);

    ui.leaderboard.innerHTML = "";

    data.forEach((p, i) => {
      ui.leaderboard.innerHTML += `
        <div class="lbRow">
          <div>${i + 1}</div>
          <div>${p.username}</div>
          <div>${p.rolls}</div>
          <div>${p.best_card || "None"}</div>
        </div>
      `;
    });
  }

  /* =========================
     INIT
  ========================= */

  renderInventory();
  show(viewers[0]);

  window.roll = roll;
  window.toggleAutoRoll = toggleAutoRoll;
  window.loadLeaderboard = loadLeaderboard;

})();
</script>
<div id="cutsceneOverlay"></div>
<div id="redLight"></div>
</div>
<div id="authModal" class="authModal">

  <div class="authCard">

    <h2 id="authTitle">
      Login
    </h2>

    <input
      id="authEmail"
      type="email"
      placeholder="Email"
    >

    <input
      id="authPassword"
      type="password"
      placeholder="Password"
    >

    <input
      id="authUsername"
      type="text"
      placeholder="Username"
      style="display:none"
    >

    <button id="authSubmit">
      Continue
    </button>

  </div>

</div>
</body>
</html>
